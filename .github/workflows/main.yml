name: build and publish v8 libs
on:
  release:
    types:
      - published

# Default GITHUB_TOKEN on a fork is read-only → release-asset upload fails with
# "Resource not accessible by integration". Grant write so gh release upload works.
permissions:
  contents: write

env:
  V8_VERSION: "14.9"

defaults:
  run:
    shell: bash

jobs:

  build-linux:
#    if: ${{ false }}  # disable
    name: linux
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: compile v8
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$GITHUB_WORKSPACE/depot_tools:${PATH}"
          gclient
          fetch v8
          # Temporal needs V8's Rust toolchain — opt in via the v8 solution's
          # custom_vars (gclient sync has no --custom-var flag). Inject before sync.
          python3 -c "p='$GITHUB_WORKSPACE/.gclient'; ns={}; exec(open(p).read(),ns); [s.setdefault('custom_vars',{}).update({'checkout_rust':True}) for s in ns.get('solutions',[]) if s.get('name')=='v8']; open(p,'w').write(''.join('%s = %r\n'%(k,ns[k]) for k in ns if not k.startswith('__')))"
          cd ${{ github.workspace }}/v8
          git checkout branch-heads/$V8_VERSION
          gclient sync
          ./build/install-build-deps.sh
          mkdir -p out.gn/linux.${{ matrix.platform }}.release/
          cp ${{ github.workspace }}/args.linux.${{ matrix.platform }}.gn $GITHUB_WORKSPACE/v8/out.gn/linux.${{ matrix.platform }}.release/args.gn
          gn gen out.gn/linux.${{ matrix.platform }}.release
          ninja v8_monolith -C out.gn/linux.${{ matrix.platform }}.release/
          gn args --list out.gn/linux.${{ matrix.platform }}.release
          tar -zcvf ../include.tar.gz include
          tar -zcvf ../src.tar.gz src
          gzip -9 -c out.gn/linux.${{ matrix.platform }}.release/obj/libv8_monolith.a > ../libv8_monolith-linux-${{ matrix.platform }}.a.gz
          tar -zcvf ../gen-linux-${{ matrix.platform }}.tar.gz out.gn/linux.${{ matrix.platform }}.release/gen
          # Temporal: the Rust temporal_rs/temporal_capi + gn local_rustc_sysroot std
          # are .rlib NOT bundled in the monolith — package them so lo-bun can link
          # them (rust-rlibs.rsp). Paths relative to v8/ so they extract back in place.
          find out.gn/linux.${{ matrix.platform }}.release/obj -name '*.rlib' > /tmp/rlibs.txt
          find out.gn/linux.${{ matrix.platform }}.release/local_rustc_sysroot -name '*.rlib' >> /tmp/rlibs.txt
          tar -zcvf ../rust-rlibs-linux-${{ matrix.platform }}.tar.gz -T /tmp/rlibs.txt
      # Fallback FIRST: capture the ~1h build as a workflow artifact regardless of
      # whether the release upload below succeeds — so a build is never lost to an
      # upload/permission failure again (the 2026-06-15 incident).
      - name: Upload build as workflow artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v8-linux-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/include.tar.gz
            ${{ github.workspace }}/src.tar.gz
            ${{ github.workspace }}/libv8_monolith-linux-${{ matrix.platform }}.a.gz
            ${{ github.workspace }}/gen-linux-${{ matrix.platform }}.tar.gz
            ${{ github.workspace }}/rust-rlibs-linux-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
      # Modern, idempotent release upload (actions/upload-release-asset@v1 is
      # archived). Needs the top-level permissions: contents: write.
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ github.workspace }}/include.tar.gz" \
            "${{ github.workspace }}/src.tar.gz" \
            "${{ github.workspace }}/libv8_monolith-linux-${{ matrix.platform }}.a.gz" \
            "${{ github.workspace }}/gen-linux-${{ matrix.platform }}.tar.gz" \
            "${{ github.workspace }}/rust-rlibs-linux-${{ matrix.platform }}.tar.gz" \
            --repo "${{ github.repository }}" --clobber

  build-mac:
    if: ${{ false }}  # disabled — linux x64 only (lo-bun)
    name: mac
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        platform: [x64,arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: build v8
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$GITHUB_WORKSPACE/depot_tools:${PATH}"
          gclient
          fetch v8
          cd ${{ github.workspace }}/v8
          git checkout branch-heads/$V8_VERSION
          gclient sync
          mkdir -p out.gn/${{ matrix.platform }}.release/
          cp ${{ github.workspace }}/args.mac.${{ matrix.platform }}.gn ${{ github.workspace }}/v8/out.gn/${{ matrix.platform }}.release/args.gn
          gn gen out.gn/${{ matrix.platform }}.release
          ninja v8_monolith -C out.gn/${{ matrix.platform }}.release/
          gn args --list out.gn/${{ matrix.platform }}.release
          gzip -9 -c out.gn/${{ matrix.platform }}.release/obj/libv8_monolith.a > ../libv8_monolith-mac-${{ matrix.platform }}.a.gz
          tar -zcvf ../gen-mac-${{ matrix.platform }}.tar.gz out.gn/${{ matrix.platform }}.release/gen
      - name: Upload static library
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/libv8_monolith-mac-${{ matrix.platform }}.a.gz
          asset_name: libv8_monolith-mac-${{ matrix.platform }}.a.gz
          asset_content_type: application/gzip
      - name: Upload generated source
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/gen-mac-${{ matrix.platform }}.tar.gz
          asset_name: gen-mac-${{ matrix.platform }}.tar.gz
          asset_content_type: application/gzip

  build-win:
    if: ${{ false }}  # disabled — linux x64 only (lo-bun)
    name: windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: setup env
        shell: pwsh
        run: |
          echo "${{ github.workspace }}/depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: prepared v8 build environment
        run: |
          git config --global depot-tools.allowGlobalGitConfig true
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          gclient
          fetch v8
          cd v8
          git checkout branch-heads/$V8_VERSION
          gclient sync
      - name: compile v8 static library
        shell: pwsh
        run: |
          New-Item -ItemType directory -Path v8/out.gn/${{ matrix.platform }}.release/
          Copy-Item "args.win.${{ matrix.platform }}.gn" -Destination "v8/out.gn/${{ matrix.platform }}.release/args.gn" -force
          Set-Location -Path v8
          gn gen out.gn/${{ matrix.platform }}.release
          ninja v8_monolith -C out.gn/${{ matrix.platform }}.release/
          gn args --list out.gn/${{ matrix.platform }}.release
      - name: compress artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ github.workspace }}/v8/out.gn/${{ matrix.platform }}.release/obj/v8_monolith.lib -Destination ${{ github.workspace }}/libv8_monolith-win-${{ matrix.platform }}.zip
          Compress-Archive -Path ${{ github.workspace }}/v8/out.gn/${{ matrix.platform }}.release/gen -Destination ${{ github.workspace }}/gen-win-${{ matrix.platform }}.zip
      - name: Upload static library
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/libv8_monolith-win-${{ matrix.platform }}.zip
          asset_name: libv8_monolith-win-${{ matrix.platform }}.zip
          asset_content_type: application/zip
      - name: Upload generated source
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/gen-win-${{ matrix.platform }}.zip
          asset_name: gen-win-${{ matrix.platform }}.zip
          asset_content_type: application/zip
